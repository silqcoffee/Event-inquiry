<script>
  document.querySelectorAll('input[name="contactRole"]').forEach(r => {
    r.addEventListener('change', () => {
      document.getElementById('plannerOrgRow').style.display =
        r.value === 'Event Planner / Coordinator' ? 'grid' : 'none';
    });
  });

  document.querySelectorAll('input[name="paymentBy"]').forEach(r => {
    r.addEventListener('change', () => {
      document.getElementById('attendeePayRow').style.display =
        r.value === 'Attendee Paid' ? 'grid' : 'none';
    });
  });

  document.getElementById("inquiryForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const acks = ['ack1','ack2','ack3','ack4'];
    for (const ack of acks) {
      if (!this[ack].checked) {
        alert('Please check all acknowledgements before submitting.');
        return;
      }
    }

    const btn = this.querySelector('.submit-btn');
    btn.textContent = 'Sending...';
    btn.disabled = true;

    // Grab every field manually by name
    const getVal = (name) => {
      const el = this.querySelector(`[name="${name}"]`);
      if (!el) return "";
      if (el.type === "radio" || el.type === "checkbox") {
        const checked = this.querySelector(`[name="${name}"]:checked`);
        return checked ? checked.value : "";
      }
      return el.value || "";
    };

    const getCheckedAll = (name) => {
      return Array.from(this.querySelectorAll(`[name="${name}"]:checked`))
        .map(el => el.value).join('; ');
    };

    const data = {
      submittedAt: new Date().toLocaleString(),
      firstName: getVal('firstName'),
      lastName: getVal('lastName'),
      email: getVal('email'),
      phone: getVal('phone'),
      contactRole: getVal('contactRole'),
      organization: getVal('organization'),
      eventType: getVal('eventType'),
      eventName: getVal('eventName'),
      eventDate: getVal('eventDate'),
      guestCount: getVal('guestCount'),
      startTime: getVal('startTime'),
      endTime: getVal('endTime'),
      duration: getVal('duration'),
      venueName: getVal('venueName'),
      venueAddress: getVal('venueAddress'),
      indoorOutdoor: getVal('indoorOutdoor'),
      powerAccess: getVal('powerAccess'),
      setupTime: getVal('setupTime'),
      venueNotes: getVal('venueNotes'),
      paymentBy: getVal('paymentBy'),
      attendeePayMethod: getVal('attendeePayMethod'),
      budget: getVal('budget'),
      billingContact: getVal('billingContact'),
      billingEmail: getVal('billingEmail'),
      experience: getCheckedAll('experience'),
      milkPref: getVal('milkPref'),
      tempPref: getVal('tempPref'),
      addons: getCheckedAll('addons'),
      menuNotes: getVal('menuNotes'),
      referralSource: getVal('referralSource'),
      returningClient: getVal('returningClient'),
      notes: getVal('notes')
    };

    try {
      await fetch("https://script.google.com/macros/s/AKfycbxcmL9Oa__hICCYiRKBcY5jGawBlmM-yMvRGvrOZ3bFeE9qgZb5N9KjpsL4lAdauL4P/exec", {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      this.style.display = 'none';
      document.getElementById('successBanner').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });

    } catch(err) {
      btn.textContent = 'Submit Inquiry';
      btn.disabled = false;
      alert("Something went wrong. Please try again or email us directly.");
    }
  });
</script>
</body>
</html>
